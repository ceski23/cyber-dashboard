name: Build and release
on: workflow_dispatch

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    release:
        name: Release new version
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7.0.0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2.2.0

            - name: Install dependencies
              run: bun install

            - name: Release new version
              id: semantic-release
              run: |
                  bunx semantic-release
                  echo "new_release_git_tag=$(git describe --exact-match --tags)" >> "$GITHUB_OUTPUT"
                  echo "new_release_version=$(npm show ./ version)" >> "$GITHUB_OUTPUT"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        outputs:
            new_release_git_tag: ${{ steps.semantic-release.outputs.new_release_git_tag }}
            new_release_version: ${{ steps.semantic-release.outputs.new_release_version }}

    build-and-push-image:
        name: Build Docker image
        runs-on: ubuntu-latest
        needs: release
        permissions:
            packages: write
            contents: read
            attestations: write
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v7.0.0
              with:
                  ref: ${{ needs.release.outputs.new_release_git_tag }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4.0.0

            - name: Log in to the Container registry
              uses: docker/login-action@v4.1.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@v6.0.0
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}

            - name: Build and push Docker image
              id: push
              uses: docker/build-push-action@v7.1.0
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Generate artifact attestation
              uses: actions/attest@v4.1.0
              with:
                  subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  subject-digest: ${{ steps.push.outputs.digest }}
                  push-to-registry: true
